<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Anuradha</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<button class="music" onclick="toggleMusic()">🎵</button>

<div class="container">

<h1>For Anuradha</h1>

<div class="subtitle">
For the nurse who spends her days healing others.
</div>

<div class="countdown">

<div class="time">
<span id="days">00</span>
<div>Days</div>
</div>

<div class="time">
<span id="hours">00</span>
<div>Hours</div>
</div>

<div class="time">
<span id="minutes">00</span>
<div>Minutes</div>
</div>

<div class="time">
<span id="seconds">00</span>
<div>Seconds</div>
</div>

</div>

<div class="cake" id="cake">🎂</div>

<button class="btn" id="openBtn" onclick="openLetter()" style="display:none;">
Open Birthday Letter
</button>

<div id="letter"></div>

<div id="admire">

<h2 class="admire-title">Why I admire you</h2>

<div class="cards">

<div class="card">Your kindness toward people who need care.</div>

<div class="card">Your strength even on difficult days.</div>

<div class="card">Your calm presence in chaotic moments.</div>

<div class="card">The genuine heart you carry everywhere.</div>

</div>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
